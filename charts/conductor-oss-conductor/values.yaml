global:
  # -- Global container image registry override
  imageRegistry: ""
  # -- Global pod image pull secrets
  imagePullSecrets: [ ]

# -- String to partially override the fullname template with a string (will prepend the release name)
nameOverride: ""
# -- String to fully override the fullname template with a string
fullnameOverride: ""

# -- Additional labels to add to all resources
labels: { }
# -- Additional labels to add to pods
podLabels: { }

# -- Annotations to add to all resources
annotations: { }
# -- Additional annotations to add to pods
podAnnotations: { }

# -- Extra init containers to inject into the main pod
extraInitContainers: [ ]
# -- Extra sidecar containers to inject into the main pod
extraContainers: [ ]
# -- Extra volumes to add to the main pod
extraVolumes: [ ]
# -- Extra volume mounts to add to the main container
extraVolumeMounts: [ ]
# -- Extra environment variables (key/value list) to inject into the main container
extraEnvVars: [ ]
# -- Extra envFrom entries to inject into the main container
extraEnvFrom: [ ]
# -- Name of a ConfigMap with extra environment variables to inject into the main container
extraEnvVarsCM: ""
# -- Name of a Secret with extra environment variables to inject into the main container
extraEnvVarsSecret: ""

image:
  # -- Main container image registry
  registry: docker.io
  # -- Main container image repository
  repository: conductoross/conductor-standalone
  # -- Main container image tag
  tag: 3.15.0
  # -- Main container image pull policy
  pullPolicy: IfNotPresent

serviceAccount:
  # -- Create a dedicated ServiceAccount
  create: true
  # -- Name for the ServiceAccount (autogenerated when empty)
  name: ""
  # -- Additional annotations to add to ServiceAccount
  annotations: { }

# -- Number of old ReplicaSets to retain
revisionHistoryLimit: 10

# -- Deployment update strategy (type only is used)
updateStrategy:
  type: RollingUpdate

# -- Pod priority class name
priorityClassName: ""

# -- Pod termination grace period
terminationGracePeriodSeconds: 60

# -- Pod security context configuration
podSecurityContext:
  # -- Enable pod security context
  enabled: true
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true
  fsGroup: 1001

# -- Container security context configuration
containerSecurityContext:
  # -- Enable container security context
  enabled: true
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true
  privileged: false
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ "ALL" ]
  seccompProfile:
    type: "RuntimeDefault"

# -- Main container requests/limits
resources:
  requests:
    cpu: 300m
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 3Gi

# -- Liveness probe configuration
livenessProbe:
  # -- Enable livenessProbe
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3
  successThreshold: 1

# -- Readiness probe configuration
readinessProbe:
  # -- Enable readinessProbe
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 10
  failureThreshold: 3
  successThreshold: 1

# -- Startup probe configuration
startupProbe:
  # -- Enable startupProbe
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 15
  successThreshold: 1

# -- Lifecycle hooks configuration
lifecycleHooks: { }

container:
  # -- Container ports used by the Pod spec and as Service targetPort values
  ports:
    ui: 5000
    http: 8080

service:
  # -- Service type (ClusterIP, NodePort, LoadBalancer)
  type: ClusterIP
  ports:
    # -- Service port for REST API
    rest: 8080
    # -- Service port for UI
    ui: 5000
  nodePorts:
    # -- NodePort value for REST API when service.type is NodePort
    rest: ""
    # -- NodePort value for UI when service.type is NodePort
    ui: ""

# -- Node selector
nodeSelector: { }
# -- Node tolerations
tolerations: [ ]
# -- Node affinity
affinity: { }
# -- Topology spread constraints
topologySpreadConstraints: [ ]

networkPolicy:
  # -- Create a NetworkPolicy
  create: false
  # -- NetworkPolicy name override (defaults to fullname when empty)
  name: ""
  # -- NetworkPolicy ingress rules
  ingress: [ ]
  # -- NetworkPolicy egress rules
  egress: [ ]

podDisruptionBudget:
  # -- Create PodDisruptionBudget for high availability
  create: false
  # -- Minimum number of pods that must be available during disruptions (mutually exclusive with maxUnavailable)
  minAvailable: 1
  # -- Maximum number of pods that can be unavailable during disruptions (mutually exclusive with minAvailable)
  maxUnavailable: ""
  # Alternatively, use maxUnavailable (mutually exclusive with minAvailable)
  # maxUnavailable: "50%"

ingress:
  # -- Create Ingress for external HTTP access
  create: false
  # -- IngressClass that will be used to implement the Ingress
  className: ""
  # -- Additional annotations for the Ingress
  annotations: { }
  # -- List of Ingress hosts with paths for API and UI
  hosts:
    - host: conductor-api.local
      paths:
        - path: /
          pathType: Prefix
          port: 8080
    - host: conductor-ui.local
      paths:
        - path: /
          pathType: Prefix
          port: 5000
  # -- TLS configuration for Ingress
  tls: [ ]

# App specific
# -- Number of pods
replicaCount: 1

cluster:
  # -- Logical cluster name for logs/metrics (defaults to Helm release when empty)
  name: ""

app:
  # -- Enable/disable workflow repair service
  workflowRepairServiceEnabled: false
  # -- Enable periodic removal of Redis keys
  enableRemoveRedisKey: false
  # -- TTL for Redis key expiry (e.g., 3600s); set only when enabling key removal
  ttlRedisKeyExpire: ""

# -- Redis configuration
redis:
  host: ""
  port: "6379"
  taskDefCacheRefreshInterval: 1
  workflowNamespacePrefix: "conductor"
  queueNamespacePrefix: "conductor_queues"

# -- Elasticsearch configuration
elasticsearch:
  enabled: false
  url: ""
  indexName: ""
  indexPrefix: ""
  indexReplicasCount: 0
  version: 7
  clusterHealthColor: yellow
  username: ""

# -- Enable Prometheus metrics
prometheus:
  enabled: false

management:
  # -- Comma-separated actuator endpoints to expose
  endpointsWebExposureInclude: "prometheus"

spring:
  # -- Spring profiles passed via SPRING_PROFILES_ACTIVE
  profilesActive: "logrotate"

# -- Application-specific secrets
secrets:
  redisPassword: ""
  elasticsearchPassword: ""

# -- Application-specific environment variables
env: { }
